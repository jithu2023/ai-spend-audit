name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    
    - name: Create .env file for tests
      run: |
        echo "NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co" >> .env.test
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder" >> .env.test
    
    - name: Run tests
      run: npm test -- --run
      env:
        NODE_ENV: test
        NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder